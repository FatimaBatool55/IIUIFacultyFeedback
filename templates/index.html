<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>IIUI Faculty Feedback Survey</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>IIUI Faculty Feedback Survey</h1>

    <p class="intro">

        Welcome to the IIUI Faculty Feedback Survey.  
        This survey collects student feedback about faculty performance, course quality, facilities, and overall academic experience.  
        Your feedback helps improve teaching quality at IIUI.

    </p>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form action="/submit" method="POST">

        <!-- =========================
                NAME SECTION
        ========================== -->

        <div class="name-row">

            <div class="input-group">

                <label>First Name</label>

                <input
                    type="text"
                    name="first_name"
                    value="{{ first_name }}"
                    readonly
                >

            </div>

            

        </div>

        <!-- =========================
                RATINGS
        ========================== -->

        <label>Faculty Rating</label>
        <select name="faculty_rating">
            <option value="1">1 - Excellent</option>
            <option value="2">2 - Very Good</option>
            <option value="3">3 - Good</option>
            <option value="4">4 - Fair</option>
            <option value="5">5 - Poor</option>
        </select>

        <label>Course Content Rating</label>
        <select name="course_rating">
            <option value="1">1 - Excellent</option>
            <option value="2">2 - Very Good</option>
            <option value="3">3 - Good</option>
            <option value="4">4 - Fair</option>
            <option value="5">5 - Poor</option>
        </select>

        <label>Facilities Rating</label>
        <select name="facilities_rating">
            <option value="1">1 - Excellent</option>
            <option value="2">2 - Very Good</option>
            <option value="3">3 - Good</option>
            <option value="4">4 - Fair</option>
            <option value="5">5 - Poor</option>
        </select>

        <label>Administration Rating</label>
        <select name="administration_rating">
            <option value="1">1 - Excellent</option>
            <option value="2">2 - Very Good</option>
            <option value="3">3 - Good</option>
            <option value="4">4 - Fair</option>
            <option value="5">5 - Poor</option>
        </select>

        <label>Overall Satisfaction Rating</label>
        <select name="overall_rating">
            <option value="1">1 - Excellent</option>
            <option value="2">2 - Very Good</option>
            <option value="3">3 - Good</option>
            <option value="4">4 - Fair</option>
            <option value="5">5 - Poor</option>
        </select>

        <!-- =========================
                COMMENTS
        ========================== -->

        <label>Comments / Suggestions</label>

        <textarea
            name="comments"
            rows="6"
            placeholder="Write your comments here..."
        ></textarea>

        <!-- =========================
                PRIVACY CARD
        ========================== -->

        <div class="privacy-card">

            <label class="privacy-option">

                <input
                    type="checkbox"
                    name="hide_identity"
                    value="yes"
                >

                <span class="custom-check"></span>

                <div class="privacy-content">

                    <h3>🔒 Hide identity</h3>

                    <p>
                        If enabled, your name and email will be hidden.  
                        Only ratings and comments will be shared. Your data will still be securely stored in the database.
                    </p>

                </div>

            </label>

        </div>

        <!-- =========================
                SUBMIT BUTTON
        ========================== -->

        <button type="submit">
            Submit Feedback
        </button>

    </form>

</div>

</body>

</html>
