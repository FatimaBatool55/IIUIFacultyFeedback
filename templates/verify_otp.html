<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Verify OTP</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>Email Verification</h1>

    <p class="intro">

        A 6-digit OTP has been sent to your official IIUI email address.  
        Please enter it below to continue to the feedback form.

    </p>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form action="/verify" method="POST">

        <label>Enter OTP</label>

        <input
            type="text"
            name="otp"
            maxlength="6"
            placeholder="Enter 6-digit OTP"
            required
        >

        <button type="submit">
            Verify OTP
        </button>

    </form>

</div>

</body>

</html>
